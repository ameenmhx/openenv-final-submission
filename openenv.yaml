version: "1.0"
name: "ChaosEnv"
description: "An autonomous SRE/DevOps simulator where an agent must diagnose and resolve server outages using terminal commands."
tasks:
  - id: "task_1_easy"
    name: "The Routine Crash"
    description: "Identify a crashed web service and restart it."
    difficulty: "easy"
  - id: "task_2_medium"
    name: "The Bad Deployment"
    description: "Diagnose a database connection error via logs and rollback the configuration."
    difficulty: "medium"
  - id: "task_3_hard"
    name: "The Cascading Memory Leak"
    description: "Identify a background process hogging memory, kill it, and restart the locked database."
    difficulty: "hard"